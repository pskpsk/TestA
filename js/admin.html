<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin</title>
<link rel="stylesheet" href="css/style.css"></head><body>
<header><h1>Admin Dashboard</h1></header>
<div class="container"><h2>Total Orders: <span id="count"></span></h2>
<h2>Revenue: ₹<span id="rev"></span></h2></div>
