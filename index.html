<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Grocery Store</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#00b386;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
    margin-top:0;
}

.price{
    color:green;
    font-weight:bold;
}

button{
    background:#00b386;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#009973;
}

.cart{
    position:fixed;
    bottom:20px;
    right:20px;
    background:white;
    padding:15px;
    border-radius:10px;
    width:250px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.cart h3{
    margin-top:0;
}
</style>
</head>
<body>

<header>
    <h1>My Society Mart</h1>
    <p>Fresh groceries delivered in minutes</p>
</header>

<div class="container">
    <div class="products" id="products"></div>
</div>

<div class="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <hr>
    <p><strong>Total ₹<span id="total">0</span></strong></p>
    <button onclick="placeOrder()">Place Order</button>
</div>

<script>
const products = [
    {id:1,name:"Milk",price:30},
    {id:2,name:"Bread",price:40},
    {id:3,name:"Eggs",price:70},
    {id:4,name:"Rice 1kg",price:60},
    {id:5,name:"Sugar 1kg",price:50},
    {id:6,name:"Tea Powder",price:120}
];

let cart=[];

function loadProducts(){
    const container=document.getElementById("products");

    products.forEach(product=>{
        container.innerHTML += `
        <div class="card">
            <h3>${product.name}</h3>
            <p class="price">₹${product.price}</p>
            <button onclick="addToCart(${product.id})">
                Add to Cart
            </button>
        </div>`;
    });
}

function addToCart(id){
    const product=products.find(p=>p.id===id);
    cart.push(product);
    renderCart();
}

function renderCart(){

    const cartItems=document.getElementById("cartItems");
    const total=document.getElementById("total");

    cartItems.innerHTML="";

    let sum=0;

    cart.forEach(item=>{
        cartItems.innerHTML += `
        <p>${item.name} - ₹${item.price}</p>`;
        sum += item.price;
    });

    total.innerText=sum;
}

function placeOrder(){

    if(cart.length===0){
        alert("Cart is empty");
        return;
    }

    alert(
      "Order placed successfully!\nTotal: ₹" +
      document.getElementById("total").innerText
    );

    cart=[];
    renderCart();
}
loadProducts();
</script>

</body>
</html>
